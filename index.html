<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Widget</title>
<style>
  @font-face {
    font-family: 'Seagram';
    src: url('seagram-tfb.ttf') format('truetype');
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.07);
    --text-primary: #f0f0f0;
    --text-muted: rgba(240,240,240,0.35);
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --offline: rgba(240,240,240,0.2);
    --radius: 20px;
    --stress-color: var(--amber);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Seagram', serif;
  }

  .card {
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 18px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    user-select: none;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at 50% 0%, rgba(240,240,240,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .pulse-ring {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0;
  }

  .pulse-ring.active {
    animation: ring-out 0.5s ease-out;
  }

  @keyframes ring-out {
    0%   { opacity: 0.9; transform: scale(1); }
    100% { opacity: 0;   transform: scale(2); }
  }

  .bpm-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1;
  }

  .bpm-number {
    font-family: 'Seagram', serif;
    font-size: 88px;
    letter-spacing: -1px;
    color: #ffffff;
    transition: opacity 0.2s;
    line-height: 0.9;
  }

  .bpm-number.stale {
    opacity: 0.3;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 12px;
  }

  .stress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stress-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stress-score-wrap {
    display: flex;
    align-items: baseline;
    gap: 3px;
  }

  .stress-score {
    font-family: 'Seagram', serif;
    font-size: 28px;
    color: var(--stress-color);
    letter-spacing: 0.5px;
    transition: color 0.5s ease;
    line-height: 1;
  }

  .stress-bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    margin-top: 10px;
    overflow: hidden;
  }

  .stress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--stress-color);
    transition: width 0.8s cubic-bezier(0.25,1,0.5,1), background 0.5s ease;
    width: 0%;
  }

  .status-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    position: relative;
  }

  .pulse-ring {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0;
    flex-shrink: 0;
  }

  .pulse-ring.active {
    animation: ring-out 0.5s ease-out;
  }

  @keyframes ring-out {
    0%   { opacity: 0.9; transform: scale(1); }
    100% { opacity: 0;   transform: scale(2); }
  }

  .bpm-heart {
    position: absolute;
    top: 28px;
    right: 24px;
    width: 18px;
    height: 18px;
  }

  .bpm-heart svg {
    width: 18px;
    height: 18px;
    fill: var(--text-muted);
    animation: heart-beat 1s ease-in-out infinite;
  }

  @keyframes heart-beat {
    0%, 100% { transform: scale(1); fill: var(--text-muted); }
    15% { transform: scale(1.15); fill: rgba(248,113,113,0.5); }
    30% { transform: scale(1); fill: var(--text-muted); }
    45% { transform: scale(1.1); fill: rgba(248,113,113,0.4); }
    60% { transform: scale(1); fill: var(--text-muted); }
  }

  .status-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.4s;
    padding-right: 10px;
  }

  .status-text.online {
    color: var(--green);
  }
</style>
</head>
<body>
<div class="card">
  <div class="bpm-heart">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
  </div>
  <div class="bpm-row">
    <div class="bpm-number" id="bpmNum">--</div>
  </div>

  <div class="divider"></div>

  <div class="stress-row">
    <div class="stress-label">HRV</div>
    <div class="stress-score-wrap">
      <div class="stress-score" id="stressNum">--</div>
    </div>
  </div>
  <div class="stress-bar-track">
    <div class="stress-bar-fill" id="stressBar"></div>
  </div>

  <div class="status-row">
    <div class="status-text" id="statusText">offline</div>
    <div class="pulse-ring" id="pulseRing"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const BASE = (params.get('url') || 'https://hr-94jv.onrender.com/').replace(/\/+$/, '');
  const POLL_MS = 1000;
  const STALE_AFTER_MS = 12000;

  const bpmEl     = document.getElementById('bpmNum');
  const stressEl  = document.getElementById('stressNum');
  const stressBar = document.getElementById('stressBar');
  const textEl    = document.getElementById('statusText');
  const ringEl    = document.getElementById('pulseRing');
  const heartEl   = document.querySelector('.bpm-heart svg');

  let staleTimer = null;

  function hrvColor(hrv) {
    if (hrv > 50) return 'var(--green)';
    if (hrv >= 30) return 'var(--amber)';
    return 'var(--red)';
  }

  function triggerPulse() {
    ringEl.classList.remove('active');
    void ringEl.offsetWidth;
    ringEl.classList.add('active');
  }

  function render(data) {
    const bpm   = data.bpm;
    const hrv   = data.hrv;
    const stale = data.stale === true;

    if (!stale) triggerPulse();
    bpmEl.textContent = bpm ?? '--';
    bpmEl.classList.toggle('stale', stale);

    if (bpm != null) {
      heartEl.style.animationDuration = (60 / bpm) + 's';
    }

    if (hrv != null) {
      const color = hrvColor(hrv);
      stressEl.textContent = hrv.toFixed(1) + 'ms';
      stressEl.style.color = color;
      stressBar.style.background = color;
      const pct = Math.min(100, Math.max(0, (hrv / 80) * 100));
      stressBar.style.width = pct + '%';
    }

    const online = !stale && bpm != null;
    textEl.classList.toggle('online', online);
    textEl.textContent = online ? 'online' : 'offline';
  }

  function setOffline() {
    textEl.classList.remove('online');
    textEl.textContent = 'offline';
    bpmEl.classList.add('stale');
  }

  async function poll() {
    try {
      const res = await fetch(BASE + '/', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      render(data);
      clearTimeout(staleTimer);
      if (!data.stale) {
        staleTimer = setTimeout(setOffline, STALE_AFTER_MS);
      }
    } catch {
      setOffline();
    }
  }

  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
