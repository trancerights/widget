<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.07);
    --text-primary: #f0f0f0;
    --text-muted: rgba(240,240,240,0.35);
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --offline: rgba(240,240,240,0.2);
    --radius: 20px;
    --stress-color: var(--amber);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .card {
    width: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 24px 18px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    user-select: none;
  }

  /* subtle inner glow that pulses with heartbeat */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    background: radial-gradient(ellipse at 50% 0%, rgba(240,240,240,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  /* pulse ring */
  .pulse-ring {
    position: absolute;
    top: 28px;
    right: 24px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    opacity: 0;
  }

  .pulse-ring.active {
    animation: ring-out 0.7s ease-out;
  }

  @keyframes ring-out {
    0%   { opacity: 0.9; transform: scale(1); }
    100% { opacity: 0;   transform: scale(3.5); }
  }

  /* ---- BPM section ---- */
  .bpm-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1;
  }

  .bpm-number {
    font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
    font-size: 88px;
    letter-spacing: -1px;
    color: var(--text-primary);
    transition: opacity 0.2s;
    line-height: 0.9;
  }

  .bpm-number.stale {
    opacity: 0.3;
  }

  .bpm-unit {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 4px;
  }

  /* ---- divider ---- */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0 12px;
  }

  /* ---- stress row ---- */
  .stress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stress-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stress-score-wrap {
    display: flex;
    align-items: baseline;
    gap: 3px;
  }

  .stress-score {
    font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
    font-size: 28px;
    color: var(--stress-color);
    letter-spacing: 0.5px;
    transition: color 0.5s ease;
    line-height: 1;
  }

  .stress-denom {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* stress bar */
  .stress-bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    margin-top: 10px;
    overflow: hidden;
  }

  .stress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--stress-color);
    transition: width 0.8s cubic-bezier(0.25,1,0.5,1), background 0.5s ease;
    width: 0%;
  }

  /* ---- status ---- */
  .status-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 5px;
    margin-top: 14px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--offline);
    transition: background 0.4s;
  }

  .status-dot.online {
    background: var(--green);
  }

  .status-text {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: color 0.4s;
  }

  .status-text.online {
    color: var(--green);
  }
</style>
</head>
<body>
<div class="card">
  <div class="pulse-ring" id="pulseRing"></div>

  <div class="bpm-row">
    <div class="bpm-number" id="bpmNum">--</div>
    <div class="bpm-unit">bpm</div>
  </div>

  <div class="divider"></div>

  <div class="stress-row">
    <div class="stress-label">Stress</div>
    <div class="stress-score-wrap">
      <div class="stress-score" id="stressNum">--</div>
      <div class="stress-denom">/100</div>
    </div>
  </div>
  <div class="stress-bar-track">
    <div class="stress-bar-fill" id="stressBar"></div>
  </div>

  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">offline</div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const BASE = (params.get('url') || 'https://hr.asteriash.xyz').replace(/\/+$/, '');
  const POLL_MS = 1000;
  const STALE_AFTER_MS = 12000;

  const bpmEl     = document.getElementById('bpmNum');
  const stressEl  = document.getElementById('stressNum');
  const stressBar = document.getElementById('stressBar');
  const dotEl     = document.getElementById('statusDot');
  const textEl    = document.getElementById('statusText');
  const ringEl    = document.getElementById('pulseRing');

  let lastBpm = null;
  let staleTimer = null;

  function hrvToStress(hrv) {
    const clamped = Math.max(0, Math.min(100, hrv));
    return Math.max(1, Math.min(100, Math.round(100 - clamped)));
  }

  function stressColor(score) {
    if (score <= 33) return 'var(--green)';
    if (score <= 66) return 'var(--amber)';
    return 'var(--red)';
  }

  function triggerPulse() {
    ringEl.classList.remove('active');
    void ringEl.offsetWidth;
    ringEl.classList.add('active');
  }

  function render(data) {
    const bpm    = data.bpm;
    const stress = data.hrv != null ? hrvToStress(data.hrv) : null;
    const stale  = data.stale === true;

    if (!stale) triggerPulse();
    lastBpm = bpm;
    bpmEl.textContent = bpm ?? '--';
    bpmEl.classList.toggle('stale', stale);

    if (stress != null) {
      const color = stressColor(stress);
      stressEl.textContent = stress;
      stressEl.style.color = color;
      stressBar.style.background = color;
      stressBar.style.width = stress + '%';
    }

    const online = !stale && bpm != null;
    dotEl.classList.toggle('online', online);
    textEl.classList.toggle('online', online);
    textEl.textContent = online ? 'online' : 'offline';
  }

  function setOffline() {
    dotEl.classList.remove('online');
    textEl.classList.remove('online');
    textEl.textContent = 'offline';
    bpmEl.classList.add('stale');
  }

  async function poll() {
    try {
      const res = await fetch(BASE + '/', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      render(data);
      clearTimeout(staleTimer);
      if (!data.stale) {
        staleTimer = setTimeout(setOffline, STALE_AFTER_MS);
      }
    } catch {
      setOffline();
    }
  }

  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
